###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = ~/.config/rofi/launchers/type-1/launcher.sh
$menu2 = ~/.config/rofi/launchers/type-2/launcher.sh

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, M, exec, pkill wlogout || wlogout
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, A, exec, swaync-client -t -sw
bind = $mainMod, O, togglefloating,
bind = $mainMod, P, pin
bind = $mainMod, Super_L, exec, sh -c 'pkill rofi || $menu'
# bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, F11, fullscreen, 2
bind = $mainMod, K, togglesplit, # dwindle
bind = $mainMod, W, exec, firefox

# CLIPBOARD & EMOTE
# bind = $mainMod, V, exec, killall -9 rofi || cliphist list | head -n 10 | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, V, exec, sh -c 'pkill rofi || cliphist list | head -n 10 | $menu2 | cliphist decode | wl-copy && sleep 0.1 && hyprctl dispatch sendshortcut CTRL, V, activewindow'
bind = $mainMod, period, exec, sh -c 'pkill rofi || BEMOJI_PICKER_CMD="~/.config/rofi/launchers/type-2/launcher.sh -dmenu" bemoji -t'
# bind = $mainMod, period, exec, sh -c 'pkill rofi || { emoji=$(BEMOJI_PICKER_CMD="~/.config/rofi/launchers/type-2/launcher.sh -dmenu" bemoji -n); sleep 0.2; wtype "$emoji"; }'

# SEARCH LAUNCHER
# bind = $mainMod, G, exec, chromium --app="file:///home/rogan/.config/my-plugins/search.html"
# bind = $mainMod, G, exec, chromium --app="https://www.google.com"
bind = $mainMod, G, exec, killall -9 search_launcher || ~/.config/my-plugins/search_launcher/target/release/search_launcher

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, L, workspace, e+1
bind = $mainMod, J, workspace, e-1

# Screenshot
bind = $mainMod, Print, exec, hyprshot -m region --clipboard-only
bind = $mainMod SHIFT, Print, exec, hyprshot -m window --clipboard-only
bind = CTRL SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = , Print, exec, killall -9 hyprshot || hyprshot -m output


# Suspend automatically
bindl = , switch:on:Lid Switch, exec, systemctl suspend

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
# Volume Control
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness Control (Pastikan Anda punya akses ke video group atau pakai brightnessctl)
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Caps Lock Indicator (Bonus jika Anda butuh)
bind = , Caps_Lock, exec, swayosd-client --caps-lock

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
